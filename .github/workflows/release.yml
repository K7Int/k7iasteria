name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag / version to publish (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Sync version (Cargo + tauri.conf.json) to tag
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${{ steps.tag.outputs.name }}"
          version="${version#v}"
          sed -i.bak "s/^version = \".*\"/version = \"$version\"/" src-tauri/Cargo.toml
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$version\"/" src-tauri/tauri.conf.json
          rm -f src-tauri/Cargo.toml.bak src-tauri/tauri.conf.json.bak

      - name: Sync version to tag (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.tag.outputs.name }}".TrimStart("v")
          (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*"', "version = `"$version`"" | Set-Content src-tauri/Cargo.toml
          (Get-Content src-tauri/tauri.conf.json) -replace '"version": ".*"', """version"": ""$version""" | Set-Content src-tauri/tauri.conf.json

      - name: Build & publish with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: "K7I Asteria ${{ steps.tag.outputs.name }}"
          releaseBody: |
            ## K7I Asteria ${{ steps.tag.outputs.name }}

            A local-first retro desktop operating system for your memories.

            ### Downloads
            - **macOS (Apple Silicon):** `.dmg` / `.app.tar.gz`
            - **macOS (Intel):** `.dmg` / `.app.tar.gz`
            - **Linux:** `.deb` / `.AppImage` / `.rpm`
            - **Windows:** `.msi` / `.exe`

            Pick the installer matching your platform and double-click to install.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}